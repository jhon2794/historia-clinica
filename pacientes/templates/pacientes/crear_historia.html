<!DOCTYPE html>
<html>
<head>
    <title>Crear Historia Clínica</title>
</head>
<body>

    <h1>Crear Historia Clínica</h1>

    <!-- Formulario que enviará los datos al backend -->
    <form method="POST">

        <!-- Seguridad obligatoria de Django -->
        {% csrf_token %}

        <br>
        <!-- Fecha de apertura -->
        <div>
            <label>Fecha Apertura:</label>
            <input
                type="date"
                name="fecha_apertura"
                required>
        </div>
        <br>

        <!-- Paciente asociado a la historia -->
        <div>

            <label>Paciente:</label>

            <select name="paciente">

                <!-- Recorre todos los pacientes enviados desde views.py -->
                {% for paciente in pacientes %}

                    <!-- El value es el id que llegará al backend -->
                    <option value="{{ paciente.id }}">

                        <!-- Texto visible para el usuario -->
                        {{ paciente.nombre }}
                        {{ paciente.apellido }}

                    </option>

                {% endfor %}

            </select>

        </div>

        <br>

        <!-- Motivo principal de consulta -->
        <div>

            <label>Motivo Consulta:</label>

            <textarea
                name="motivo_consulta"
                rows="4"
                cols="50"></textarea>

        </div>

        <br>

        <!-- Descripción de la enfermedad actual -->
        <div>

            <label>Enfermedad Actual:</label>

            <textarea
                name="enfermedad_actual"
                rows="4"
                cols="50"></textarea>

        </div>

        <br>

        <!-- Antecedentes del paciente -->
        <div>

            <label>Antecedentes:</label>

            <textarea
                name="antecedentes"
                rows="4"
                cols="50"></textarea>

        </div>

        <br>

        <!-- Diagnóstico inicial -->
        <div>

            <label>Diagnóstico Inicial:</label>

            <textarea
                name="diagnostico_inicial"
                rows="4"
                cols="50"></textarea>

        </div>

        <br>

        <!-- Botón para guardar -->
        <button type="submit">
            Guardar Historia
        </button>

    </form>

</body>
</html>
