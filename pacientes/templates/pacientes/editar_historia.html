<!DOCTYPE html>

<html>
<head>

```
<title>Editar Historia Clínica</title>

<style>

    body{
        font-family: Arial, sans-serif;
        background:#f4f6f9;
        margin:0;
        padding:20px;
    }

    .contenedor{
        max-width:900px;
        margin:auto;
    }

    .encabezado{
        background:#1e3a8a;
        color:white;
        padding:20px;
        border-radius:10px;
        margin-bottom:20px;
    }

    .card{
        background:white;
        padding:25px;
        border-radius:10px;
        box-shadow:0 2px 5px rgba(0,0,0,0.1);
    }

    .campo{
        margin-bottom:15px;
    }

    label{
        display:block;
        font-weight:bold;
        margin-bottom:5px;
    }

    input,
    select,
    textarea{
        width:100%;
        padding:10px;
        box-sizing:border-box;
    }

    textarea{
        min-height:100px;
        resize:vertical;
    }

    .boton{
        background:#2563eb;
        color:white;
        padding:10px 15px;
        border:none;
        border-radius:5px;
        text-decoration:none;
        cursor:pointer;
    }

    .boton:hover{
        background:#1d4ed8;
    }

    .acciones{
        margin-top:20px;
    }

</style>
```

</head>

<body>

{% include 'pacientes/navbar.html' %}

<div class="contenedor">

```
<div class="encabezado">
    <h1>Editar Historia Clínica</h1>
</div>

<div class="card">

    <form method="POST">

        {% csrf_token %}

        <div class="campo">

            <label>Fecha Apertura</label>

            <input
                type="date"
                name="fecha_apertura"
                value="{{ historia.fecha_apertura|date:'Y-m-d' }}"
                required
            >

        </div>

        <div class="campo">

            <label>Paciente</label>

            <select name="paciente">

                {% for paciente in pacientes %}

                    <option
                        value="{{ paciente.id }}"

                        {% if paciente.id == historia.paciente.id %}
                            selected
                        {% endif %}
                    >

                        {{ paciente.tipo_documento }}
                        -
                        {{ paciente.identificacion }}
                        -
                        {{ paciente.nombre }}
                        {{ paciente.apellido }}

                    </option>

                {% endfor %}

            </select>

        </div>

        <div class="campo">

            <label>Motivo Consulta</label>

            <textarea
                name="motivo_consulta"
                required
            >{{ historia.motivo_consulta }}</textarea>

        </div>

        <div class="campo">

            <label>Enfermedad Actual</label>

            <textarea
                name="enfermedad_actual"
                required
            >{{ historia.enfermedad_actual }}</textarea>

        </div>

        <div class="campo">

            <label>Antecedentes</label>

            <textarea
                name="antecedentes"
                required
            >{{ historia.antecedentes }}</textarea>

        </div>

        <div class="campo">

            <label>Diagnóstico Inicial</label>

            <textarea
                name="diagnostico_inicial"
                required
            >{{ historia.diagnostico_inicial }}</textarea>

        </div>

        <div class="acciones">

            <button
                type="submit"
                class="boton"
            >
                Actualizar Historia
            </button>

            <a
                href="{% url 'lista_historias' %}"
                class="boton"
            >
                Volver
            </a>

        </div>

    </form>

</div>
```

</div>

</body>
</html>
